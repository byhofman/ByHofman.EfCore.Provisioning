name: Publish NuGet Package

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      - name: Test
        run: dotnet test --configuration Release --no-build

      - name: Pack
        run: >
          dotnet pack src/ByHofman.EfCore.Provisioning/ByHofman.EfCore.Provisioning.csproj
          --configuration Release --no-build
          -p:Version=${{ steps.version.outputs.version }}
          --output ${{ github.workspace }}/artifacts

      - name: Push to GitHub Packages
        run: >
          dotnet nuget push "${{ github.workspace }}/artifacts/*.nupkg"
          --source "https://nuget.pkg.github.com/byhofman/index.json"
          --api-key ${{ secrets.GITHUB_TOKEN }}
          --skip-duplicate
